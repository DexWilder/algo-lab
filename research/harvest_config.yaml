# FQL Strategic Harvest Configuration
# Controls automated and semi-automated strategy idea sourcing.
#
# DESIGN PRINCIPLE: Broad intake first, ruthless filtering later.
# The harvest layer casts a wide net. The validation layer is strict.
# Do not over-constrain search — you want elite outliers, which often
# look strange before validation.
#
# Updated: 2026-03-20

# ── Global Settings ──────────────────────────────────────────────────────────
harvest:
  enabled: true                     # Master switch ON
  max_ideas_per_run: 5              # Cap on new ideas logged per harvest run
  dedupe_check: true                # Check registry for duplicate/similar ideas before logging
  auto_log_to_registry: false       # If true, auto-add to registry as status=idea. If false, stage only.
  manifest_path: "research/data/harvest_manifest.json"
  genome_map_path: "research/data/strategy_genome_map.json"

# ── Harvest Mode ─────────────────────────────────────────────────────────────
# tactical: fill specific gaps identified by genome map + factor decomposition
# strategic: broad discovery sweep across all sources (high volume, periodic)
mode: tactical

# ── Gap-Aware Targeting ──────────────────────────────────────────────────────
# These priorities are derived from the portfolio gap dashboard + registry.
# Updated periodically. Must stay synced with portfolio truth.
targeting:
  priority_gaps:
    # Factor gaps (from portfolio_gap_dashboard.py 2026-03-20)
    - dimension: "factor"
      target: "VOLATILITY"
      note: "0 core, 1 probation (VolManaged). Biggest validated gap."
      priority: HIGH

    - dimension: "factor"
      target: "VALUE"
      note: "0 core, 0 probation, 0 ideas in catalog. Blind spot."
      priority: HIGH

    - dimension: "factor"
      target: "CARRY"
      note: "0 core, 1 probation (Treasury-Rolldown). Thin, fragile."
      priority: MEDIUM

    - dimension: "factor"
      target: "STRUCTURAL"
      note: "0 core, 1 probation (ZN-Afternoon-Rev). Thin, fragile."
      priority: MEDIUM

    - dimension: "factor"
      target: "EVENT"
      note: "0 core, 2 probation (PreFOMC, TV-NFP). Growing but no core yet."
      priority: MEDIUM

    # Asset gaps
    - dimension: "asset_class"
      target: "energy"
      note: "0 strategies on MCL. Complete blind spot."
      priority: HIGH

    - dimension: "asset_class"
      target: "rate"
      note: "2 probation on ZN. No core yet. Pipeline active."
      priority: MEDIUM

    # Session gaps
    - dimension: "session"
      target: "afternoon"
      note: "1 probation (ZN-Afternoon-Rev). Zero non-rates afternoon."
      priority: MEDIUM

    # Horizon gaps
    - dimension: "horizon"
      target: "daily"
      note: "Only 2 daily-bar strategies. Multi-horizon is thin."
      priority: MEDIUM

    # Direction gap
    - dimension: "direction"
      target: "short"
      note: "Long:Short = 2.7:1. Need short-biased or both-direction ideas."
      priority: MEDIUM

    # Regime gap
    - dimension: "regime_tendency"
      target: "ranging"
      note: "Portfolio is trending-dependent. Need ranging-market strategies."
      priority: LOW

  # ── Closed Families ──────────────────────────────────────────────────────
  # HIGH BAR ONLY — not absolute ban. Generic versions are rejected.
  # Accept ONLY if note explicitly states the prior failure mode and
  # describes a new mechanism that addresses it.
  high_bar_families:
    - family: "mean_reversion x equity_index"
      failures: 5
      failure_mode: "structural loss on M2K/MES 5m bars, 25-40% WR"
      allow_if: "genuinely different mechanism (e.g., vol-gated, daily bars, different asset)"

    - family: "ict x any"
      failures: 2
      failure_mode: "ICT concepts (FVG, sweeps, order blocks) did not produce systematic edge"
      allow_if: "strictly mechanical with no discretionary interpretation, addresses specific ICT failure"

    - family: "gap_fade / gap_reversal"
      failures: 3
      failure_mode: "gaps on liquid futures hold more than reverse (PF 0.68-0.88)"
      allow_if: "vol-state conditioning or materially different gap definition"

    - family: "overnight equity continuation"
      failures: 3
      failure_mode: "Unconditional PF 0.96. Z-score+vol filter makes it WORSE (PF 0.69). Overnight moves reverse on high-vol days."
      allow_if: "fundamentally different asset class (not equity index) or reversal-based mechanism"
      closed_date: "2026-03-20"

    - family: "overnight equity premium"
      failures: 2
      failure_mode: "PF 1.03-1.09 unfiltered and filtered — too weak standalone"
      allow_if: "fundamentally different filtering mechanism or different asset class"

    - family: "breakout x morning equity"
      count: 13
      failure_mode: "saturated, not failed — no more generic variants needed"
      allow_if: "clearly superior to all 13 existing variants with evidence"

    - family: "cash_close_reversion x rates"
      failures: 1
      failure_mode: "Cash close is not special — PF 0.87 at 15:00 vs PF 1.32 at 14:00. Impulse filter degrades performance."
      allow_if: "different timing window or different asset class"
      closed_date: "2026-03-20"

  # ── Momentum Policy ────────────────────────────────────────────────────
  # Portfolio is 55% momentum. New momentum ideas must clear a higher bar.
  momentum_policy: "high_bar"
  momentum_acceptance_criteria:
    - "new_horizon: operates on a horizon not yet covered by existing momentum (e.g., swing, weekly)"
    - "new_asset_class: targets an asset class where we have no momentum coverage"
    - "superior_evidence: shows clear evidence of superiority over existing momentum sleeves"
    - "structural_difference: uses a fundamentally different entry mechanism (not just parameter tweak)"
    - "portfolio_role: fills a specific gap like afternoon momentum, close-driven, or macro-trend on uncovered assets"

# ── Source Lanes ─────────────────────────────────────────────────────────────
# Status: ACTIVE = live and producing notes
#         ENABLED = configured but may not have dedicated automation
#         DORMANT = planned but not yet implemented
#         DISABLED = explicitly turned off

source_lanes:

  # ── ACTIVE LANES (producing notes via Claw weekly schedule) ──

  openclaw_tactical:
    status: ACTIVE                   # Mon gap harvest
    enabled: true
    description: "OpenClaw targeted prompts for factor gaps"
    type: tactical
    intake_path: "~/openclaw-intake/inbox/"
    cadence: "weekly"
    max_per_run: 5
    targeting_mode: "gap_aware"
    factor_targets:
      - "VALUE"                      # NEW — biggest catalog blind spot
      - "VOLATILITY"                 # #1 portfolio gap (0 core)
      - "CARRY"
      - "EVENT"
      - "STRUCTURAL"
    asset_bias:
      - "energy"                     # 0 strategies
      - "rates"                      # pipeline active but thin
      - "commodity"                  # non-MGC options
    direction_bias: "prefer short-biased or both-direction"
    notes: "Factor-aware tactical harvesting. VALUE is now the top priority — no ideas exist in catalog."

  openclaw_strategic:
    status: ACTIVE                   # Tue academic + supplemental
    enabled: true
    description: "OpenClaw factor-aware strategic discovery"
    type: strategic
    intake_path: "~/openclaw-intake/inbox/"
    cadence: "weekly"
    max_per_run: 10
    targeting_mode: "gap_aware"
    factor_targets:
      - "VALUE"                      # NEW
      - "VOLATILITY"                 # NEW — elevated
      - "EVENT"
      - "CARRY"
      - "STRUCTURAL"
    secondary_targets:
      - "afternoon_close_session"
      - "daily_bar_non_momentum"
      - "energy_native"
      - "rate_native"
      - "short_biased_any_asset"     # NEW
      - "commodity_vol"              # NEW — non-equity VOL
    notes: "Strategic discovery biased toward factor gaps. VALUE and non-equity VOL are new priorities."

  tradingview_scan:
    status: ACTIVE                   # Thu TradingView scan
    enabled: true
    description: "TradingView public script scan — factor-aware, futures-focused"
    type: strategic
    cadence: "weekly"
    max_per_run: 10
    targeting_mode: "gap_aware"
    factor_targets:
      - "VALUE"                      # NEW
      - "VOLATILITY"
      - "EVENT"
      - "CARRY"
      - "STRUCTURAL"
    filters:
      - "futures"
      - "intraday OR daily"
      - "NOT crypto"
      - "NOT forex spot (futures only)"
    search_terms:
      - "FOMC trading strategy futures"
      - "session breakout futures"
      - "mean reversion afternoon futures"
      - "volatility squeeze daily futures"
      - "carry trade futures"
      - "CPI NFP reaction futures"
      - "closing range futures strategy"
      - "crude oil futures strategy"         # NEW — energy gap
      - "treasury futures strategy"          # NEW — rates gap
      - "value investing futures"            # NEW — VALUE gap
      - "short selling futures systematic"   # NEW — short bias
      - "commodity vol strategy futures"     # NEW — non-equity VOL
    notes: "Weekly TradingView search. Broadened to cover VALUE, energy, rates, short-bias, and commodity vol."

  academic_review:
    status: ACTIVE                   # Tue academic scan (via Claw)
    enabled: true
    description: "Academic paper / quant blog review for documented futures edges"
    type: strategic
    cadence: "biweekly"
    max_per_run: 8
    targeting_mode: "gap_aware"
    factor_targets:
      - "VALUE"                      # NEW
      - "VOLATILITY"
      - "EVENT"
      - "CARRY"
      - "STRUCTURAL"
    sources:
      - "SSRN"
      - "Quantpedia"
      - "QuantifiedStrategies"
      - "AlphaArchitect"
      - "Journal of Financial Economics"
      - "Review of Financial Studies"
      - "Return Stacked"
      - "arXiv quantitative finance"         # NEW
    notes: "Biweekly literature review. VALUE factor is a new search priority. Focus on documented edges with futures applicability."

  youtube_practitioner:
    status: ENABLED                  # Enabled in config, no dedicated Claw task day
    enabled: true
    description: "YouTube / practitioner strategy extraction — mechanical rules only"
    type: strategic
    cadence: "biweekly"
    max_per_run: 5
    targeting_mode: "gap_aware"
    factor_targets:
      - "STRUCTURAL"
      - "VOLATILITY"
      - "EVENT"
      - "VALUE"                      # NEW
    filters:
      - "futures only"
      - "must have explicit entry/exit rules"
      - "reject discretionary / narrative-only methods"
      - "reject ICT/SMC concepts (closed family)"
    notes: "Extract only mechanical, testable rules. No dedicated Claw task day — folded into Thu practitioner scan."

  # ── DORMANT LANES (planned, not yet implemented) ──

  github_quant_repos:
    status: DORMANT
    enabled: false
    description: "Scan GitHub for systematic futures strategy repos with testable code"
    type: strategic
    cadence: "monthly"
    max_per_run: 5
    targeting_mode: "gap_aware"
    factor_targets:
      - "VOLATILITY"
      - "VALUE"
      - "STRUCTURAL"
    search_targets:
      - "systematic futures trading"
      - "quantitative trading strategies python"
      - "backtesting framework strategies"
      - "commodity futures systematic"
    notes: "DORMANT — no scraper or fetcher implemented. Would scan GitHub repos for mechanical strategies with code. Low priority until other lanes are saturated."
    implementation_needed: "GitHub API search + repo content extraction script"

  reddit_forums:
    status: DORMANT
    enabled: false
    description: "Reddit / X / quant forums for practitioner ideas and edge discussions"
    type: strategic
    cadence: "biweekly"
    max_per_run: 5
    targeting_mode: "broad"
    subreddits:
      - "r/algotrading"
      - "r/quant"
      - "r/FuturesTrading"
    notes: "DORMANT — no scraper implemented. Would extract mechanical strategy descriptions from practitioner discussions. Noise-to-signal ratio is high; aggressive filtering needed."
    implementation_needed: "Reddit API integration or Claw web-search capability"

  microstructure_specialists:
    status: DORMANT
    enabled: false
    description: "Commodity, rates, and FX specialist sources for microstructure edges"
    type: strategic
    cadence: "monthly"
    max_per_run: 5
    factor_targets:
      - "STRUCTURAL"
      - "CARRY"
    sources:
      - "CME Group research papers"
      - "ICE Futures research"
      - "Commodity-specific blogs (e.g., Goehring & Rozencwajg, Leigh Drogen)"
      - "FX-specific (e.g., BIS Triennial Survey insights, LMAX research)"
      - "Rates-specific (e.g., Treasury market structure writeups)"
    notes: "DORMANT — no dedicated fetcher. Covers non-obvious adjacent ideas from asset-class specialists. Would be high signal-to-noise if implemented."
    implementation_needed: "Manual curation or Claw web-search with specialist source list"

  # ── DISABLED LANES ──

  legacy_revival:
    status: DISABLED
    enabled: false
    description: "Re-examine rejected strategies for salvage under new conditions"
    type: tactical
    cadence: "quarterly"
    max_per_run: 3
    targeting_mode: "rejection_review"
    filters:
      - "rejection_reason: IMPLEMENTATION_BUG"
      - "rejection_reason: SAMPLE_INSUFFICIENT"
      - "rejection_reason: WALK_FORWARD_UNSTABLE"
    notes: "DISABLED — only revisit strategies with fixable rejection reasons, not structural losses."
