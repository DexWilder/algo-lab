# FQL Strategic Harvest Configuration
# Controls automated and semi-automated strategy idea sourcing.
# ALL lanes are DISABLED by default. Enable one at a time.

# ── Global Settings ──────────────────────────────────────────────────────────
harvest:
  enabled: true                     # Master switch ON — tactical lane active
  max_ideas_per_run: 5              # Cap on new ideas logged per harvest run
  dedupe_check: true                # Check registry for duplicate/similar ideas before logging
  auto_log_to_registry: false       # If true, auto-add to registry as status=idea. If false, stage only.
  manifest_path: "research/data/harvest_manifest.json"
  genome_map_path: "research/data/strategy_genome_map.json"

# ── Harvest Mode ─────────────────────────────────────────────────────────────
# tactical: fill specific gaps identified by genome map + factor decomposition
# strategic: broad discovery sweep across all sources (high volume, periodic)
mode: tactical

# ── Gap-Aware Targeting ──────────────────────────────────────────────────────
# These priorities are derived from the Strategy Genome Map analysis.
# Updated periodically based on genome classifier output.
targeting:
  # Genome map gaps to prioritize (highest priority first)
  priority_gaps:
    - dimension: "horizon"
      target: "daily"
      note: "Only 1 active daily-bar strategy. Multi-horizon is thin."
      priority: HIGH

    - dimension: "asset_class"
      target: "energy"
      note: "0 viable energy strategies. MCL decaying."
      priority: HIGH

    - dimension: "asset_class"
      target: "rate"
      note: "0 active rate strategies after 4 failed attempts."
      priority: MEDIUM

    - dimension: "session"
      target: "afternoon"
      note: "Afternoon/close session underrepresented."
      priority: MEDIUM

    - dimension: "regime_tendency"
      target: "ranging"
      note: "Portfolio is trending-dependent. Need ranging-market strategies."
      priority: MEDIUM

    - dimension: "factor"
      target: "EVENT"
      note: "0 primary EVENT strategies. Calendar-driven returns are uncorrelated to momentum."
      priority: HIGH

    - dimension: "factor"
      target: "CARRY"
      note: "0 primary CARRY strategies. Macro directional bias is only implicit, never explicit."
      priority: MEDIUM

    - dimension: "factor"
      target: "STRUCTURAL"
      note: "Only 1 primary STRUCTURAL strategy (FXBreak-6J). Session-transition edges underrepresented."
      priority: MEDIUM

    - dimension: "direction"
      target: "short"
      note: "Only 3 short-only strategies. Structural long bias."
      priority: LOW

  # Previously weak/closed families — HIGH BAR ONLY, not absolute ban.
  # Generic versions are rejected. A candidate is accepted ONLY if it:
  #   1. States the prior family failure mode explicitly
  #   2. Describes a new mechanism that addresses that failure mode
  #   3. Explains why it is not a cosmetic variation of a tested idea
  # If those are missing, reject or deprioritize.
  high_bar_families:
    - family: "mean_reversion x equity_index"
      failures: 5
      failure_mode: "structural loss on M2K/MES 5m bars, 25-40% WR"
      allow_if: "genuinely different mechanism (e.g., vol-gated, daily bars, different asset)"
    - family: "ict x any"
      failures: 2
      failure_mode: "ICT concepts (FVG, sweeps, order blocks) did not produce systematic edge"
      allow_if: "strictly mechanical with no discretionary interpretation, addresses specific ICT failure"
    - family: "gap_fade / gap_reversal"
      failures: 3
      failure_mode: "gaps on liquid futures hold more than reverse (PF 0.68-0.88)"
      allow_if: "vol-state conditioning or materially different gap definition"
    - family: "overnight equity premium"
      failures: 2
      failure_mode: "PF 1.03-1.09 unfiltered and filtered — too weak standalone"
      allow_if: "fundamentally different filtering mechanism or different asset class"
    - family: "breakout x morning equity"
      count: 13
      failure_mode: "saturated, not failed — no more generic variants needed"
      allow_if: "clearly superior to all 13 existing variants with evidence"

  # Momentum acceptance rule (NOT a blanket ban — high bar only)
  # Portfolio is 54% momentum. New momentum ideas must clear a higher bar:
  momentum_policy: "high_bar"
  momentum_acceptance_criteria:
    # A momentum idea is accepted ONLY if it meets at least ONE of:
    - "new_horizon: operates on a horizon not yet covered by existing momentum (e.g., swing, weekly)"
    - "new_asset_class: targets an asset class where we have no momentum coverage"
    - "superior_evidence: shows clear evidence of superiority over existing momentum sleeves"
    - "structural_difference: uses a fundamentally different entry mechanism (not just parameter tweak)"
    - "portfolio_role: fills a specific gap like afternoon momentum, close-driven, or macro-trend on uncovered assets"
    # If none of these are met, deprioritize. Do not auto-reject — flag for manual review.

# ── Source Lanes ─────────────────────────────────────────────────────────────
# Each lane is independently enable/disable. Only one should be active at a time
# during initial rollout.

source_lanes:
  openclaw_tactical:
    enabled: true
    description: "OpenClaw targeted prompts for factor gaps (EVENT, CARRY, STRUCTURAL)"
    type: tactical
    intake_path: "~/openclaw-intake/inbox/"
    cadence: "weekly"
    max_per_run: 5
    targeting_mode: "gap_aware"       # Uses priority_gaps + factor gaps above
    factor_targets:
      - "EVENT"                       # Highest priority factor gap
      - "CARRY"                       # Second priority
      - "STRUCTURAL"                  # Third priority (already have 1, want more)
    notes: "Factor-aware tactical harvesting. Review every note manually before accepting. Reject any momentum variants immediately."

  openclaw_strategic:
    enabled: true
    description: "OpenClaw factor-aware strategic discovery"
    type: strategic
    intake_path: "~/openclaw-intake/inbox/"
    cadence: "weekly"
    max_per_run: 10
    targeting_mode: "gap_aware"       # Factor-aware, not truly broad
    factor_targets:
      - "EVENT"
      - "CARRY"
      - "STRUCTURAL"
    secondary_targets:
      - "afternoon_close_session"
      - "daily_bar_non_momentum"
      - "energy_native"
      - "rate_native"
    notes: "Strategic discovery biased toward factor gaps. Manual review required. Reject momentum variants on sight."

  tradingview_scan:
    enabled: true
    description: "TradingView public script scan — factor-aware, futures-focused"
    type: strategic
    cadence: "weekly"
    max_per_run: 10
    targeting_mode: "gap_aware"
    factor_targets:
      - "EVENT"
      - "CARRY"
      - "STRUCTURAL"
      - "VOLATILITY"
    filters:
      - "futures"
      - "intraday OR daily"
      - "NOT crypto"
      - "NOT forex spot (futures only)"
    search_terms:
      - "FOMC trading strategy futures"
      - "session breakout futures"
      - "mean reversion afternoon futures"
      - "volatility squeeze daily futures"
      - "carry trade futures"
      - "overnight drift futures"
      - "CPI NFP reaction futures"
      - "closing range futures strategy"
    notes: "Biweekly manual TradingView search. Use search_terms as starting prompts. Factor-aware review before staging. Reject momentum clones and equity-morning-breakout variants on sight."

  academic_review:
    enabled: true
    description: "Academic paper / quant blog review for documented futures edges"
    type: strategic
    cadence: "biweekly"
    max_per_run: 8
    targeting_mode: "gap_aware"
    factor_targets:
      - "EVENT"
      - "CARRY"
      - "VOLATILITY"
      - "STRUCTURAL"
    sources:
      - "SSRN"
      - "Quantpedia"
      - "QuantifiedStrategies"
      - "AlphaArchitect"
      - "Journal of Financial Economics"
      - "Review of Financial Studies"
    notes: "Biweekly literature review. Focus on documented edges with futures applicability. Extract mechanical rules only. Tag with full schema."

  youtube_practitioner:
    enabled: true
    description: "YouTube / practitioner strategy extraction — mechanical rules only"
    type: strategic
    cadence: "biweekly"
    max_per_run: 5
    targeting_mode: "gap_aware"
    factor_targets:
      - "STRUCTURAL"
      - "VOLATILITY"
      - "EVENT"
    filters:
      - "futures only"
      - "must have explicit entry/exit rules"
      - "reject discretionary / narrative-only methods"
      - "reject ICT/SMC concepts (closed family)"
    notes: "Extract only mechanical, testable rules from practitioner content. Do NOT copy full presentations. Summarize logic in standard intake note format. Reject anything without clear entry/exit rules."

  legacy_revival:
    enabled: false
    description: "Re-examine rejected strategies for salvage under new conditions"
    type: tactical
    cadence: "quarterly"
    max_per_run: 3
    targeting_mode: "rejection_review"
    filters:
      - "rejection_reason: IMPLEMENTATION_BUG"
      - "rejection_reason: SAMPLE_INSUFFICIENT"
      - "rejection_reason: WALK_FORWARD_UNSTABLE"
    notes: "Only revisit strategies with fixable rejection reasons, not structural losses."
